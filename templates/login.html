{% extends 'base.html' %}
{% block title %}Organizer Login – EventMgr{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white text-center">
        <h4 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Organizer Login</h4>
      </div>
      <div class="card-body p-4">
        <p class="text-muted text-center small mb-4">
          Default credentials — <code>organizer</code> / <code>admin123</code>
        </p>
        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="organizer"
              required
              autocomplete="username"
            />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
          </div>
        </form>
        <p class="text-center small mt-3 mb-0">
          Need an account? <a href="{{ url_for('signup') }}">Create organizer account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
